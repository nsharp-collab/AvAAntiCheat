## AvA Anti-Cheat default configuration

# config-version: Do not touch this! The plugin uses it to detect if your config file is outdated.
config-version: 3

# default-mode: plugin startup mode (0=Disabled, 1=All, 2=Flight, 3=PvP, 4=Chat Spam)
default-mode: 1

# --- Update Settings ---
# If true, the plugin will download the latest .jar from GitHub when a version mismatch is found.
# Requires a server restart to apply.
auto-update: true

# enable-logging: when true the plugin writes to `plugins/AvAAntiCheat/logs/`
enable-logging: true

# --- Advanced Logging Settings ---
# How many old log files to keep in the /logs/ folder before deleting the oldest ones.
# 20 means you will keep the last 20 startups/sessions.
max-logs: 20

# enabled-checks: Toggle specific checks on or off. 
# This allows you to customize "Mode 1" or disable specific annoyances.
enabled-checks:
  flight: true
  speed: true
  spider: true
  phase: true
  chat-spam: true
  combat: true
  mod-detector: true

# --- Mod Detector Settings ---
# The Mod Detector listens to the background "handshake" channels clients send to the server.
# NOTE: This only catches "honest" mods (like minimaps or world downloaders) that announce themselves.
# Hacked clients (like Meteor or Wurst) lie to the server and say they are Vanilla, so they won't show up here!
# 
# To find a mod's channel name, have a player join with the mod installed, and type: /ac mods <player>
# You only need to type a part of the channel name here to ban it.
banned-mods:
  - "xaerominimap"
  - "worlddownloader"
  - "wdl"
  - "journeymap"
  - "voxelmap"

# speed-check: Configure the sensitivity of the speed detection
speed-check:
  # base-limit: The max horizontal distance allowed per tick for normal walking/sprinting.
  base-limit: 0.65
  # ice-limit: The max speed allowed while on ice.
  ice-limit: 1.3
  # grace-period-ms: Grace period in milliseconds after elytra is unequipped.
  grace-period-ms: 7000

# combat-timeout-seconds: How long players remain in combat after hitting or being hit (in seconds).
combat-timeout-seconds: 30

# combat-timer-position: Where the combat timer should display on the player's screen.
# Valid options: ACTION_BAR, BOSS_BAR, SUBTITLE
combat-timer-position: ACTION_BAR

# kick-limits: number of offenses of each type required before an automatic kick
kick-limits:
  flight: 5
  speed: 10
  spider: 5
  chat-spam: 5
  sequence: 5
  attack-speed: 5